name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  id-token: write

jobs:
  lint-and-test:
    name: Lint & Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - tec-api-gateway
          - tec-auth-service
          - tec-payment-service
          - tec-wallet-service
          - tec-notification-service
          - tec-kyc-service
          - tec-commerce-service
          - tec-asset-service

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm test -- --forceExit --testTimeout=10000 --coverage
        continue-on-error: true
        timeout-minutes: 5

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage/
          retention-days: 7

  coverage-gate:
    name: Coverage Gate (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: always()
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        service:
          - tec-payment-service
          - tec-wallet-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install --legacy-peer-deps

      - name: Run coverage check
        working-directory: ${{ matrix.service }}
        # ✅ thresholds من package.json — مش hardcoded
        run: npm test -- --forceExit --testTimeout=10000 --coverage
        timeout-minutes: 5

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: tec-api-gateway
            image:   tec-api-gateway
          - service: tec-auth-service
            image:   tec-auth-service
          - service: tec-payment-service
            image:   tec-payment-service
          - service: tec-wallet-service
            image:   tec-wallet-service
          - service: tec-notification-service
            image:   tec-notification-service
          - service: tec-kyc-service
            image:   tec-kyc-service
          - service: tec-commerce-service
            image:   tec-commerce-service
          - service: tec-asset-service
            image:   tec-asset-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service }}
          file:    ${{ matrix.service }}/Dockerfile
          push:    false
          tags:    ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  migrate:
    name: DB Migration (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    continue-on-error: true
    timeout-minutes: 10
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        service:
          - tec-auth-service
          - tec-payment-service
          - tec-wallet-service
          - tec-notification-service
          - tec-kyc-service
          - tec-commerce-service
          - tec-asset-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install --legacy-peer-deps

      - name: Validate RAILWAY_TOKEN
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN not set — skipping migration"
            exit 0
          fi
          echo "RAILWAY_TOKEN is present."

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Run Prisma migrations
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Running migrations for ${{ matrix.service }}..."
          railway run --service ${{ matrix.service }} --environment production npx prisma migrate deploy

  deploy:
    name: Deploy (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    timeout-minutes: 15
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        service:
          - tec-api-gateway
          - tec-auth-service
          - tec-payment-service
          - tec-wallet-service
          - tec-notification-service
          - tec-kyc-service
          - tec-commerce-service
          - tec-asset-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN not set — skipping deploy"
            exit 0
          fi
          echo "Deploying ${{ matrix.service }}..."
          railway up --service ${{ matrix.service }} --environment production --detach --ci || true

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint-and-test, docker-build]
    if: failure() && github.event_name == 'push'
    steps:
      - name: Log failure
        run: echo "Pipeline failed on ${{ github.ref_name }}"

name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: tec-frontend
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        working-directory: tec-frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: tec-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_GATEWAY_URL: https://api-gateway-production-6a68.up.railway.app
          NEXT_PUBLIC_REALTIME_URL:    https://realtime-service-production-9630.up.railway.app

      - name: Run E2E tests against production
        working-directory: tec-frontend
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: https://tec-app.vercel.app
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tec-frontend/playwright-report/
          retention-days: 7

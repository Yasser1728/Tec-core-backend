name: Publish @yasser172/tec-shared to npm

on:
  push:
    branches:
      - main
    paths:
      - 'shared/**'
  workflow_dispatch:

jobs:
  security-gate:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Zero-Width Character Scan
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const ZWC = /[\u200B-\u200F\u202A-\u202E\u2060-\u2064\uFEFF\u00AD]/g;
          function scan(dir) {
            for (const f of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, f.name);
              if (f.isDirectory() && !['node_modules','dist'].includes(f.name)) scan(full);
              else if (f.name.endsWith('.ts')) {
                const content = fs.readFileSync(full, 'utf-8');
                if (ZWC.test(content)) { console.error('ZWC found: ' + full); process.exit(1); }
              }
            }
          }
          scan('./src');
          console.log('Clean — no zero-width chars.');
          "

  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    needs: security-gate
    defaults:
      run:
        working-directory: shared
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          PUBLISHED=$(npm view @yasser172/tec-shared version 2>/dev/null || echo "0.0.0")
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$PUBLISHED" = "$CURRENT" ]; then
            echo "Version $CURRENT already published — skipping"
            exit 0
          fi
          echo "Publishing @yasser172/tec-shared@$CURRENT..."
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
